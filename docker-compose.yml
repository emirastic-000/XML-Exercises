services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  server:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/xml-training
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  mongo-data:
