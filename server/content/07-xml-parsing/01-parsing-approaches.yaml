quiz:
  - question: "Which parsing approach loads the entire XML document into memory as a tree?"
    options:
      - "SAX"
      - "StAX"
      - "DOM"
      - "XPath"
    correct: 2
    explanation: "DOM (Document Object Model) loads the complete document into memory as a tree structure, allowing random access to any node."

  - question: "What is the main advantage of SAX over DOM?"
    options:
      - "SAX supports XPath queries"
      - "SAX allows document modification"
      - "SAX uses very little memory because it doesn't build a tree"
      - "SAX is easier to code"
    correct: 2
    explanation: "SAX's main advantage is low memory usage — it processes events sequentially without storing the document tree. This makes it suitable for very large XML files."

  - question: "What makes StAX different from SAX?"
    options:
      - "StAX builds a tree, SAX does not"
      - "StAX is a pull parser (you request events), SAX is a push parser (events are pushed to callbacks)"
      - "StAX supports XPath, SAX does not"
      - "StAX uses more memory than SAX"
    correct: 1
    explanation: "StAX is a pull parser where the application requests the next event, giving it more control. SAX is a push parser where events are fired via callbacks, requiring the application to react."
