id: "02-xpath-advanced"
title: "Advanced XPath"
order: 2

reading: |
  ## Advanced XPath Techniques

  Building on the basics, advanced XPath lets you write powerful queries using complex predicates, string functions, and set operations.

  ### Complex Predicates

  Predicates can be combined and nested:

  ```
  //book[@category='fiction'][price < 15]
  → Fiction books cheaper than 15

  //book[author='Erik Ray' or author='Jon Duckett']
  → Books by either author

  //book[not(@category='fiction') and price > 20]
  → Non-fiction books over 20

  //book[contains(title, 'XML')][1]
  → First book with 'XML' in the title
  ```

  ### String Functions

  | Function | Description | Example |
  |---|---|---|
  | `string-length(s)` | Length of string | `//title[string-length(text()) > 20]` |
  | `substring(s, start, len)` | Extract substring | `substring('Hello', 1, 3)` → 'Hel' |
  | `concat(s1, s2, ...)` | Concatenate strings | `concat(//book[1]/title, ' by ', //book[1]/author)` |
  | `normalize-space(s)` | Trim and collapse whitespace | `normalize-space('  hello  world  ')` → 'hello world' |
  | `translate(s, from, to)` | Character replacement | `translate('Hello', 'lo', 'LO')` → 'HeLLO' |
  | `contains(s, sub)` | Check if contains | `//title[contains(., 'XML')]` |
  | `starts-with(s, sub)` | Check if starts with | `//title[starts-with(., 'The')]` |
  | `substring-before(s, d)` | Text before delimiter | `substring-before('12-34', '-')` → '12' |
  | `substring-after(s, d)` | Text after delimiter | `substring-after('12-34', '-')` → '34' |

  ### Number Functions

  ```
  sum(//price)          → sum of all price values
  floor(9.7)            → 9
  ceiling(9.2)          → 10
  round(9.5)            → 10
  number('42')          → 42
  ```

  ### Boolean Operators

  ```
  //book[price > 10 and price < 30]     → price between 10 and 30
  //book[price < 10 or price > 50]      → cheap or expensive books
  //book[not(@category='fiction')]       → non-fiction books
  ```

  ### The Union Operator ( | )

  Select multiple node sets:

  ```
  //book/title | //book/author
  → All title AND author elements

  //book[1] | //book[last()]
  → First and last book
  ```

  ### Axes in Depth

  ```xml
  <catalog>
    <section name="A">
      <item id="1"><name>Alpha</name></item>
      <item id="2"><name>Beta</name></item>
    </section>
    <section name="B">
      <item id="3"><name>Gamma</name></item>
    </section>
  </catalog>
  ```

  ```
  //item[@id='2']/following-sibling::item
  → items after id=2 in the same section (none here)

  //item[@id='2']/preceding-sibling::item
  → item with id=1

  //item[@id='1']/ancestor::section
  → the section containing item id=1

  //section[@name='A']/descendant::name
  → all <name> descendants in section A
  ```

exercises:
  - id: "ex1"
    type: "write-xpath"
    prompt: "Write an XPath expression to select all books with a price greater than 10 that are in the 'fiction' category."
    sourceDocument: |
      <bookstore>
        <book category="fiction">
          <title>The Great Gatsby</title>
          <price>10.99</price>
        </book>
        <book category="nonfiction">
          <title>Learning XML</title>
          <price>39.95</price>
        </book>
        <book category="fiction">
          <title>War and Peace</title>
          <price>14.50</price>
        </book>
        <book category="fiction">
          <title>Le Petit Prince</title>
          <price>8.50</price>
        </book>
      </bookstore>
    expectedAnswer:
      - "//book[@category='fiction' and price > 10]"
      - "/bookstore/book[@category='fiction' and price > 10]"
      - "//book[@category='fiction'][price > 10]"

  - id: "ex2"
    type: "write-xpath"
    prompt: "Write an XPath expression to select the titles of all books that contain the word 'XML' in their title."
    sourceDocument: |
      <bookstore>
        <book><title>Learning XML</title></book>
        <book><title>XML Schema</title></book>
        <book><title>The Great Gatsby</title></book>
        <book><title>Advanced XML Techniques</title></book>
      </bookstore>
    expectedAnswer:
      - "//book[contains(title, 'XML')]/title"
      - "//book/title[contains(text(), 'XML')]"
      - "//book/title[contains(., 'XML')]"

quiz:
  - question: "What does the XPath expression sum(//price) return?"
    options:
      - "A list of all price elements"
      - "The sum of the text values of all price elements"
      - "The number of price elements"
      - "The average price"
    correct: 1
    explanation: "sum() converts the text content of all selected nodes to numbers and returns their sum."

  - question: "What does the union operator (|) do in XPath?"
    options:
      - "Performs a logical AND"
      - "Combines two node sets into one"
      - "Filters nodes"
      - "Selects the intersection of two sets"
    correct: 1
    explanation: "The union operator combines two node sets, returning all nodes from both sets."

  - question: "Which axis selects all descendants of the current node?"
    options:
      - "child::"
      - "descendant::"
      - "following::"
      - "self::"
    correct: 1
    explanation: "The descendant:: axis selects all descendants (children, grandchildren, etc.) of the current node."
