quiz:
  - question: "What does FLWOR stand for?"
    options:
      - "Find, Load, Write, Output, Return"
      - "For, Let, Where, Order by, Return"
      - "Filter, List, Where, Order, Restrict"
      - "For, Loop, With, Or, Return"
    correct: 1
    explanation: "FLWOR stands for For, Let, Where, Order by, Return — the five clauses of XQuery's main expression type."

  - question: "What is the difference between 'for' and 'let' in XQuery?"
    options:
      - "'for' is faster than 'let'"
      - "'for' iterates over each item, 'let' assigns the entire sequence to a variable"
      - "'let' is only used inside 'for'"
      - "There is no difference"
    correct: 1
    explanation: "'for' iterates, binding the variable to each item one at a time. 'let' assigns the whole sequence to the variable at once."

  - question: "What do curly braces {} do inside XQuery element constructors?"
    options:
      - "They define comments"
      - "They define variables"
      - "They embed XQuery expressions whose results are inserted into the output"
      - "They create attributes"
    correct: 2
    explanation: "Curly braces in element constructors are 'enclosed expressions' — they evaluate the XQuery expression inside and insert the result into the constructed element."
